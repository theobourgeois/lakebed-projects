<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>lakebed</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect x='10' y='10' width='80' height='80' fill='%232563eb'/></svg>">
<script>
  (function () {
    var saved = localStorage.getItem("lakebed-theme");
    var theme = saved === "light" || saved === "dark"
      ? saved
      : (window.matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light");
    document.documentElement.setAttribute("data-theme", theme);
  })();
</script>
<style>
  :root {
    --bg: #ffffff;
    --surface: #ffffff;
    --border: #e4e4e4;
    --border-strong: #111111;
    --text: #0a0a0a;
    --muted: #757575;
    --faint: #a3a3a3;
    --blue: #2563eb;
    --blue-dark: #1d4ed8;
    --red: #dc2626;
    --logs-bg: #fafafa;
    --press: #f5f5f5;
    --mono: ui-monospace, SFMono-Regular, Menlo, monospace;
  }
  [data-theme="dark"] {
    --bg: #161616;
    --surface: #1c1c1c;
    --border: #333333;
    --border-strong: #fafafa;
    --text: #f0f0f0;
    --muted: #a8a8a8;
    --faint: #6b6b6b;
    --blue: #3b82f6;
    --blue-dark: #2563eb;
    --red: #ef4444;
    --logs-bg: #1a1a1a;
    --press: #252525;
  }
  * { box-sizing: border-box; margin: 0; }
  html { color-scheme: light; }
  html[data-theme="dark"] { color-scheme: dark; }
  body {
    background: var(--bg); color: var(--text);
    font: 14.5px/1.5 -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    -webkit-font-smoothing: antialiased;
  }
  ::selection { background: var(--blue); color: #fff; }
  .wrap { max-width: 780px; margin: 0 auto; padding: 48px 24px 96px; }

  /* ---- header ---------------------------------------------------------- */
  header { display: flex; align-items: baseline; gap: 12px; }
  .logo { font-size: 21px; font-weight: 750; letter-spacing: -.03em; }
  .logo .cursor {
    display: inline-block; width: 9px; height: 17px; background: var(--blue);
    margin-left: 3px; vertical-align: -2px;
  }
  .spacer { flex: 1; }
  .header-actions { display: flex; align-items: center; gap: 10px; }
  .theme-toggle {
    width: 30px; height: 30px; padding: 0; border-radius: 2px;
    color: var(--muted); justify-content: center;
  }
  .theme-toggle:hover { color: var(--text); }
  .theme-toggle svg { width: 15px; height: 15px; display: block; }
  .theme-toggle .icon-moon { display: none; }
  [data-theme="dark"] .theme-toggle .icon-sun { display: none; }
  [data-theme="dark"] .theme-toggle .icon-moon { display: block; }
  .user { display: flex; align-items: center; gap: 8px; color: var(--muted); font-size: 12.5px; }
  .user img { width: 22px; height: 22px; border-radius: 50%; filter: grayscale(1); align-self: center; }
  .meta {
    margin: 10px 0 40px; padding-top: 10px; border-top: 1px solid var(--border);
    font: 11px var(--mono); letter-spacing: .08em; text-transform: uppercase; color: var(--faint);
    display: flex; gap: 8px; flex-wrap: wrap;
  }
  .meta b { color: var(--muted); font-weight: 500; }

  /* ---- controls -------------------------------------------------------- */
  .newrow { display: flex; gap: 8px; margin-bottom: 36px; }
  .newrow input {
    flex: 1; background: var(--surface); border: 1px solid var(--border); border-radius: 2px;
    padding: 10px 13px; font: 13.5px var(--mono); color: var(--text); outline: none;
    transition: border-color .12s;
  }
  .newrow input::placeholder { color: var(--faint); }
  .newrow input:focus { border-color: var(--border-strong); }

  button {
    font: inherit; font-size: 13px; font-weight: 550; cursor: pointer;
    border: 1px solid var(--border); background: var(--surface); color: var(--text);
    border-radius: 2px; padding: 7px 13px; transition: border-color .12s, background .12s, color .12s;
    display: inline-flex; align-items: center; gap: 6px; white-space: nowrap;
  }
  button:hover { background: var(--press); }
  button:active { background: var(--press); }
  button:disabled { opacity: .4; cursor: default; pointer-events: none; }
  button.primary { background: var(--blue); border-color: var(--blue); color: #fff; padding: 10px 18px; }
  button.primary:hover { background: var(--blue-dark); border-color: var(--blue-dark); }
  button.blue { color: var(--blue); border-color: color-mix(in srgb, var(--blue) 40%, var(--surface)); }
  button.blue:hover { background: var(--blue); border-color: var(--blue); color: #fff; }
  button.danger:hover { background: var(--surface); border-color: var(--red); color: var(--red); }
  button.ghost { border-color: transparent; color: var(--muted); padding: 7px 8px; }
  button.ghost:hover { color: var(--text); border-color: var(--border); background: var(--press); }

  /* ---- split button (Editor) ------------------------------------------- */
  .split {
    position: relative; display: inline-flex; align-items: stretch;
    border: 1px solid var(--border); border-radius: 2px; background: var(--surface);
    transition: background .12s;
  }
  .split:hover { background: var(--press); }
  .split > button {
    border: none; border-radius: 0; background: transparent; padding: 7px 11px;
  }
  .split > button:hover { border-color: transparent; background: transparent; }
  .split > button:active { background: transparent; }
  .split-main { padding-right: 10px; }
  .split-sep {
    width: 1px; align-self: stretch; background: var(--border); flex-shrink: 0;
  }
  .split-toggle { padding: 7px 2px; color: var(--muted); }
  .split-toggle:hover { color: var(--text); }
  .split-toggle svg { width: 14px; height: 14px; display: block; }
  .split.open { z-index: 30; }
  .split-menu {
    display: none; position: absolute; top: calc(100% + 4px); left: 0; min-width: 148px; z-index: 31;
    background: var(--surface); border: 1px solid var(--border); border-radius: 2px;
    padding: 4px; box-shadow: 0 8px 24px rgba(0,0,0,.12);
  }
  .split.open .split-menu { display: block; }
  [data-theme="dark"] .split-menu { box-shadow: 0 8px 24px rgba(0,0,0,.4); }
  .split-item {
    width: 100%; justify-content: flex-start; gap: 8px;
    border: none; border-radius: 2px; background: transparent;
    padding: 7px 10px; font-weight: 500; color: var(--text);
  }
  .split-item:hover { background: color-mix(in srgb, var(--press) 70%, var(--muted)); border-color: transparent; }
  .split-item svg { width: 14px; height: 14px; flex-shrink: 0; }
  .split-item .check { margin-left: auto; color: var(--faint); font-size: 11px; }
  .split-item.default .check { color: var(--blue); }

  .listlabel {
    font: 11px var(--mono); letter-spacing: .08em; text-transform: uppercase; color: var(--faint);
    margin-bottom: 12px; display: flex; align-items: center; gap: 10px;
  }
  .listlabel::after { content: ""; flex: 1; border-top: 1px solid var(--border); }

  /* ---- cards ----------------------------------------------------------- */
  .card {
    background: var(--surface); border: 1px solid var(--border); border-radius: 2px;
    margin-bottom: 12px; overflow: visible; position: relative; transition: border-color .15s;
  }
  .card:has(.split.open) { z-index: 20; }
  .card:hover { border-color: color-mix(in srgb, var(--border) 40%, var(--muted)); }
  .card.live { border-left: 2px solid var(--blue); }
  .card-main { padding: 16px 18px 14px; }
  .card-top { display: flex; align-items: center; gap: 10px; }
  .idx { font: 11px var(--mono); color: var(--faint); letter-spacing: .05em; }
  .pname {
    display: inline-flex; align-items: center; gap: 6px;
    font-size: 15.5px; font-weight: 650; letter-spacing: -.015em;
  }
  .pname input {
    font: inherit; font-weight: 650; color: var(--text); background: transparent;
    border: none; border-bottom: 1.5px solid var(--blue); outline: none; width: 190px; padding: 0;
  }
  .pname-edit {
    display: inline-flex; align-items: center; justify-content: center;
    width: 22px; height: 22px; padding: 0; border: none; border-radius: 2px;
    background: transparent; color: var(--faint); cursor: pointer;
    opacity: 0; transition: opacity .12s, color .12s, background .12s;
  }
  .card:hover .pname-edit, .pname-edit:focus-visible { opacity: 1; }
  .pname-edit:hover { color: var(--text); background: var(--press); }
  .pname-edit svg { width: 13px; height: 13px; display: block; }
  .status {
    font: 10.5px var(--mono); letter-spacing: .1em; text-transform: uppercase; color: var(--faint);
  }
  .status.on { color: var(--blue); }
  .status::before { content: "○ "; }
  .status.on::before { content: "▪ "; }

  .links { display: flex; flex-wrap: wrap; gap: 4px 18px; margin: 7px 0 13px 33px; font: 12.5px var(--mono); }
  .links a { color: var(--blue); text-decoration: none; }
  .links a:hover { text-decoration: underline; text-underline-offset: 3px; }
  .links .quiet { color: var(--faint); }

  .actions { display: flex; flex-wrap: wrap; align-items: center; gap: 8px; margin-left: 33px; }
  .portbox {
    display: inline-flex; align-items: center; gap: 6px; color: var(--faint);
    font: 10.5px var(--mono); letter-spacing: .08em; text-transform: uppercase;
  }
  .portbox input {
    width: 64px; background: var(--surface); border: 1px solid var(--border); border-radius: 2px;
    padding: 6px 8px; font: 12.5px var(--mono); color: var(--text); outline: none; text-align: center;
  }
  .portbox input:focus { border-color: var(--border-strong); }
  .portbox input:disabled { color: var(--faint); background: var(--logs-bg); }

  .subform { display: flex; gap: 8px; align-items: center; margin: 12px 0 2px 33px; }
  .subform input {
    background: var(--surface); border: 1px solid var(--border); border-radius: 2px;
    padding: 7px 10px; font: 12.5px var(--mono); color: var(--text); outline: none; width: 190px;
  }
  .subform input:focus { border-color: var(--border-strong); }
  .subform .suffix { color: var(--faint); font: 12.5px var(--mono); margin-left: -2px; }

  .badge {
    font: 10.5px var(--mono); letter-spacing: .1em; text-transform: uppercase;
    color: var(--blue); display: inline-flex; align-items: center; gap: 6px;
  }
  .badge.spin::before {
    content: ""; width: 8px; height: 8px; display: inline-block;
    border: 1.5px solid currentColor; border-top-color: transparent; border-radius: 50%;
    animation: spin .7s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .logs {
    border-top: 1px solid var(--border); background: var(--logs-bg);
    padding: 13px 18px; max-height: 300px; overflow-y: auto;
    font: 12px/1.75 var(--mono); white-space: pre-wrap; word-break: break-all; color: var(--muted);
  }

  .empty {
    text-align: center; color: var(--faint); padding: 64px 0;
    border: 1px dashed var(--border); border-radius: 2px; font: 12.5px var(--mono);
  }

  /* ---- toasts ---------------------------------------------------------- */
  #toasts { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%); display: flex; flex-direction: column; gap: 8px; z-index: 10; }
  .toast {
    background: #0a0a0a; color: #fff; padding: 10px 18px; border-radius: 2px;
    font-size: 13px; box-shadow: 0 4px 16px rgba(0,0,0,.18); animation: rise .18s ease-out;
  }
  [data-theme="dark"] .toast { background: #f5f5f5; color: #0a0a0a; }
  .toast.err { background: var(--red); }
  @keyframes rise { from { opacity: 0; transform: translateY(6px); } }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="logo">lakebed<span class="cursor"></span></div>
    <div class="spacer"></div>
    <div class="header-actions">
      <button class="theme-toggle ghost" id="theme-toggle" type="button" aria-label="Toggle dark mode" title="Toggle dark mode" onclick="toggleTheme()">
        <svg class="icon-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41"/>
        </svg>
        <svg class="icon-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M21 14.5A8.5 8.5 0 1 1 9.5 3a7 7 0 0 0 11.5 11.5z"/>
        </svg>
      </button>
      <div class="user" id="user"></div>
    </div>
  </header>
  <div class="meta" id="meta"></div>

  <div class="newrow">
    <input id="newname" placeholder="new-project-name" spellcheck="false"
           autocomplete="off" onkeydown="if(event.key==='Enter')createProject()">
    <button class="primary" id="createbtn" onclick="createProject()">New project ↵</button>
  </div>

  <div class="listlabel" id="listlabel">Projects</div>
  <div id="list"></div>
</div>
<div id="toasts"></div>

<script>
let state = { projects: [] };
// per-project transient UI state
const ui = {}; // name -> { logsOpen, logKind, renaming, domainOpen, editorOpen }

// Icons from react-icons: SiCursor, MdTerminal, MdArrowDropDown, MdEdit, MdCheck
const ICON_CURSOR = `<svg viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M11.503.131 1.891 5.678a.84.84 0 0 0-.42.726v11.188c0 .3.162.575.42.724l9.609 5.55a1 1 0 0 0 .998 0l9.61-5.55a.84.84 0 0 0 .42-.724V6.404a.84.84 0 0 0-.42-.726L12.497.131a1.01 1.01 0 0 0-.996 0M2.657 6.338h18.55c.263 0 .43.287.297.515L12.23 22.918c-.062.107-.229.064-.229-.06V12.335a.59.59 0 0 0-.295-.51l-9.11-5.257c-.109-.063-.064-.23.061-.23"/></svg>`;
const ICON_TERMINAL = `<svg viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M20 4H4a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2h16c1.1 0 2-.9 2-2V6a2 2 0 0 0-2-2m0 14H4V8h16zm-2-1h-6v-2h6zM7.5 17l-1.41-1.41L8.67 13l-2.59-2.59L7.5 9l4 4z"/></svg>`;
const ICON_CARET = `<svg viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="m7 10 5 5 5-5z"/></svg>`;
const ICON_EDIT = `<svg viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M3 17.25V21h3.75L17.81 9.94l-3.75-3.75zM20.71 7.04a.996.996 0 0 0 0-1.41l-2.34-2.34a.996.996 0 0 0-1.41 0l-1.83 1.83 3.75 3.75z"/></svg>`;
const ICON_CHECK = `<svg viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M9 16.17 4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z"/></svg>`;

function u(name) { return ui[name] || (ui[name] = { logKind: "dev" }); }

function preferredTheme() {
  const saved = localStorage.getItem("lakebed-theme");
  if (saved === "light" || saved === "dark") return saved;
  return window.matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light";
}

function applyTheme(theme) {
  document.documentElement.setAttribute("data-theme", theme);
  const btn = document.getElementById("theme-toggle");
  if (btn) btn.title = theme === "dark" ? "Switch to light mode" : "Switch to dark mode";
}

function toggleTheme() {
  const next = document.documentElement.getAttribute("data-theme") === "dark" ? "light" : "dark";
  localStorage.setItem("lakebed-theme", next);
  applyTheme(next);
}

applyTheme(preferredTheme());

async function api(path, body) {
  const res = await fetch(path, body
    ? { method: "POST", headers: { "content-type": "application/json" }, body: JSON.stringify(body) }
    : undefined);
  const data = await res.json();
  if (!res.ok) throw new Error(data.error || res.statusText);
  return data;
}

function toast(msg, err) {
  const el = document.createElement("div");
  el.className = "toast" + (err ? " err" : "");
  el.textContent = msg;
  document.getElementById("toasts").appendChild(el);
  setTimeout(() => el.remove(), 4200);
}

function esc(s) { return String(s).replace(/[&<>"]/g, c => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;" }[c])); }

// ---------------------------------------------------------------------------

async function refresh() {
  try {
    const prev = state;
    state = await api("/api/state");
    // detect job completions to toast
    for (const p of state.projects) {
      const before = prev.projects && prev.projects.find(q => q.name === p.name);
      if (before && before.job && !p.job && p.lastJob) {
        toast(p.lastJob.ok
          ? (p.lastJob.kind === "deploy" ? `${p.name} deployed` : `Domain updated for ${p.name}`)
          : `${p.lastJob.kind} failed for ${p.name} — see logs`, !p.lastJob.ok);
      }
    }
    if (prev.createJob && !state.createJob) toast("Project created");
    // don't blow away focus while the user is typing in a card input
    const ae = document.activeElement;
    if (ae && ae.tagName === "INPUT" && document.getElementById("list").contains(ae)) return;
    // keep the editor menu stable — full re-render makes the card flash
    if (Object.keys(ui).some((k) => ui[k].editorOpen)) return;
    render();
  } catch (e) { /* server restarting; keep last render */ }
}

function render() {
  const home = "/Users/" + (state.root || "").split("/")[2];
  document.getElementById("meta").innerHTML =
    `<b>${esc((state.root || "").replace(home, "~"))}</b><span>·</span><span>${state.projects.length} project${state.projects.length === 1 ? "" : "s"}</span>`;

  const userEl = document.getElementById("user");
  if (state.user) {
    userEl.innerHTML = `<img src="${esc(state.user.avatarUrl)}" alt=""> ${esc(state.user.login)}`;
  } else if (state.authChecked) {
    userEl.innerHTML = `<span>not logged in — run <code>npx lakebed auth login</code></span>`;
  }

  const running = state.projects.filter(p => p.running).length;
  document.getElementById("listlabel").textContent =
    `Projects${running ? ` — ${running} running` : ""}`;

  document.getElementById("createbtn").disabled = !!state.createJob;
  document.getElementById("createbtn").innerHTML = state.createJob
    ? `<span class="badge spin" style="color:#fff">creating</span>` : "New project ↵";

  const list = document.getElementById("list");
  if (!state.projects.length) {
    list.innerHTML = `<div class="empty">no projects yet — create one above</div>`;
    return;
  }
  list.innerHTML = state.projects.map(cardHTML).join("");
  for (const p of state.projects) {
    if (u(p.name).logsOpen) pollLogs(p.name);
  }
}

function cardHTML(p, i) {
  const s = u(p.name);
  const running = !!p.running;
  const busy = !!p.job;
  const port = running ? p.running.port : (p.port || "");

  const nameHTML = s.renaming
    ? `<input value="${esc(p.name)}" id="rn-${esc(p.name)}" spellcheck="false"
         onkeydown="if(event.key==='Enter')doRename('${esc(p.name)}');if(event.key==='Escape'){u('${esc(p.name)}').renaming=false;render()}">
       <button class="pname-edit" type="button" title="Save" aria-label="Save name" style="opacity:1"
               onclick="doRename('${esc(p.name)}')">${ICON_CHECK}</button>`
    : `${esc(p.name)}
       <button class="pname-edit" type="button" title="Rename" aria-label="Rename"
               onclick="u('${esc(p.name)}').renaming=true;render();document.getElementById('rn-${esc(p.name)}')?.focus()">${ICON_EDIT}</button>`;

  const links = [];
  if (running) links.push(`<a href="http://localhost:${port}" target="_blank">localhost:${port} ↗</a>`);
  const shown = new Set();
  const addDeployLink = (url) => {
    if (!url || shown.has(url)) return;
    shown.add(url);
    links.push(`<a href="${esc(url)}" target="_blank">${esc(url.replace(/^https?:\/\//, ""))} ↗</a>`);
  };
  if (p.deploy) {
    for (const d of p.deploy.domains || []) addDeployLink(d.url);
    addDeployLink(p.deploy.url);
    if (p.deploy.defaultUrl && p.deploy.defaultUrl !== p.deploy.url) addDeployLink(p.deploy.defaultUrl);
  }
  if (!links.length) links.push(`<span class="quiet">not deployed</span>`);

  return `
  <div class="card ${running ? "live" : ""}">
    <div class="card-main">
      <div class="card-top">
        <span class="idx">${String(i + 1).padStart(2, "0")}</span>
        <div class="pname">${nameHTML}</div>
        ${busy ? `<span class="badge spin">${esc(p.job.kind)}ing</span>` : ""}
        <div class="spacer" style="flex:1"></div>
        <span class="status ${running ? "on" : ""}">${running ? "running" : "idle"}</span>
      </div>
      <div class="links">${links.join("")}</div>
      <div class="actions">
        ${running
          ? `<button class="danger" onclick="act('${esc(p.name)}','/api/dev/stop')">■ Stop</button>`
          : `<button onclick="startDev('${esc(p.name)}')">▶ Run</button>`}
        <span class="portbox">port
          <input type="number" id="port-${esc(p.name)}" value="${port}" placeholder="auto"
                 ${running ? "disabled" : ""} onchange="setPort('${esc(p.name)}',this.value)">
        </span>
        <button class="blue" ${busy ? "disabled" : ""} onclick="deploy('${esc(p.name)}')">↑ Deploy</button>
        <button ${busy ? "disabled" : ""} onclick="u('${esc(p.name)}').domainOpen=!u('${esc(p.name)}').domainOpen;render()">Domain</button>
        <div class="split ${s.editorOpen ? "open" : ""}" data-split="${esc(p.name)}">
          <button class="split-main" type="button" onclick="openIn('${esc(p.name)}','cursor')">Editor</button>
          <span class="split-sep" aria-hidden="true"></span>
          <button class="split-toggle" type="button" aria-label="Open in…" aria-expanded="${s.editorOpen ? "true" : "false"}"
                  onclick="event.stopPropagation();toggleEditorMenu('${esc(p.name)}')">${ICON_CARET}</button>
          <div class="split-menu" role="menu">
            <button class="split-item default" type="button" role="menuitem" onclick="openIn('${esc(p.name)}','cursor')">
              ${ICON_CURSOR} Cursor <span class="check">default</span>
            </button>
            <button class="split-item" type="button" role="menuitem" onclick="openIn('${esc(p.name)}','terminal')">
              ${ICON_TERMINAL} Terminal
            </button>
          </div>
        </div>
        <button class="ghost" onclick="toggleLogs('${esc(p.name)}')">${s.logsOpen ? "hide logs" : "logs"}</button>
      </div>
      ${s.domainOpen ? `
      <div class="subform">
        <input id="dom-${esc(p.name)}" placeholder="my-app" spellcheck="false"
               onkeydown="if(event.key==='Enter')addDomain('${esc(p.name)}')">
        <span class="suffix">.lakebed.app</span>
        <button onclick="addDomain('${esc(p.name)}')">Add domain</button>
      </div>` : ""}
    </div>
    ${s.logsOpen ? `<div class="logs" id="logs-${esc(p.name)}"></div>` : ""}
  </div>`;
}

// ---------------------------------------------------------------------------
// actions
// ---------------------------------------------------------------------------

async function act(name, path, extra) {
  try { await api(path, { name, ...extra }); refresh(); }
  catch (e) { toast(e.message, true); }
}

function setEditorMenu(name, open) {
  for (const key of Object.keys(ui)) ui[key].editorOpen = false;
  document.querySelectorAll(".split.open").forEach((el) => {
    el.classList.remove("open");
    el.querySelector(".split-toggle")?.setAttribute("aria-expanded", "false");
  });
  if (!open) return;
  u(name).editorOpen = true;
  const el = document.querySelector(`.split[data-split="${CSS.escape(name)}"]`);
  if (!el) return;
  el.classList.add("open");
  el.querySelector(".split-toggle")?.setAttribute("aria-expanded", "true");
}

function toggleEditorMenu(name) {
  setEditorMenu(name, !u(name).editorOpen);
}

function openIn(name, app) {
  setEditorMenu(name, false);
  act(name, "/api/open", { app });
}

document.addEventListener("click", (e) => {
  if (e.target.closest?.(".split")) return;
  if (!Object.keys(ui).some((k) => ui[k].editorOpen)) return;
  setEditorMenu(null, false);
});

document.addEventListener("keydown", (e) => {
  if (e.key !== "Escape") return;
  if (!Object.keys(ui).some((k) => ui[k].editorOpen)) return;
  setEditorMenu(null, false);
});

async function createProject() {
  const input = document.getElementById("newname");
  const name = input.value.trim();
  if (!name) return;
  try {
    await api("/api/create", { name });
    input.value = "";
    refresh();
  } catch (e) { toast(e.message, true); }
}

function startDev(name) {
  const port = document.getElementById(`port-${name}`)?.value;
  const s = u(name);
  s.logsOpen = true; s.logKind = "dev";
  act(name, "/api/dev/start", { port: port || undefined });
}

function setPort(name, port) {
  if (!port) return;
  act(name, "/api/port", { port });
}

function deploy(name) {
  const s = u(name);
  s.logsOpen = true; s.logKind = "job";
  act(name, "/api/deploy");
}

function addDomain(name) {
  const sub = document.getElementById(`dom-${name}`)?.value.trim();
  if (!sub) return;
  const s = u(name);
  s.logsOpen = true; s.logKind = "job"; s.domainOpen = false;
  act(name, "/api/domain", { subdomain: sub });
}

async function doRename(name) {
  const newName = document.getElementById(`rn-${name}`)?.value.trim();
  u(name).renaming = false;
  if (!newName || newName === name) { render(); return; }
  try { await api("/api/rename", { name, newName }); refresh(); }
  catch (e) { toast(e.message, true); render(); }
}

function toggleLogs(name) {
  const s = u(name);
  s.logsOpen = !s.logsOpen;
  render();
}

async function pollLogs(name) {
  const s = u(name);
  const el = document.getElementById(`logs-${name}`);
  if (!el) return;
  try {
    const data = await api(`/api/logs?name=${encodeURIComponent(name)}&kind=${s.logKind || "dev"}`);
    const atBottom = el.scrollHeight - el.scrollTop - el.clientHeight < 40;
    el.textContent = data.lines.length ? data.lines.join("\n") : "(no output yet)";
    if (atBottom) el.scrollTop = el.scrollHeight;
  } catch {}
}

// ---------------------------------------------------------------------------

refresh();
setInterval(refresh, 2000);
setInterval(() => {
  for (const p of state.projects || []) if (u(p.name).logsOpen) pollLogs(p.name);
}, 1200);
</script>
</body>
</html>
